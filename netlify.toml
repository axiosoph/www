[build]
command = "curl -sSfL https://sukr.io/release/x86_64-linux/sukr -o /tmp/sukr && chmod +x /tmp/sukr && /tmp/sukr"
publish = "public"

[[headers]]
for = "/*"
[headers.values]
  Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'sha256-DPkx90n/yY2RdFrA6pyLryiSIgPSeIOdNTpq2tWcR6A='; frame-ancestors 'none'"
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Workaround: sukr sets prefix="./" for 404 pages, which breaks
# asset paths when served from sub-paths. A 302 redirect ensures
# the browser resolves relative paths from /404.html correctly.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 302
  force = false
